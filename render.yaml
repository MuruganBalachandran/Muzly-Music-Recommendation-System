services:
  # Python ML Model Service
  - type: web
    name: muzly-ml
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api_server:app --host 0.0.0.0 --port 8001
    env: python
    region: singapore # Best region for India
    plan: free
    envVars:
      - key: PORT
        value: 8001
      - key: OPENWEATHER_API_KEY
        sync: false # Set this in the Render dashboard

  # Node.js Server (which also serves the client)
  - type: web
    name: muzly-server
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    env: node
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ML_API_URL
        fromService:
          name: muzly-ml
          type: web
          property: host
      # Add other vars like MONGO_URI, JWT_SECRET, etc. in dashboard
